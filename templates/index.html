<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OmniVision AI</title>

    <link rel="stylesheet"
          href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

<div class="container">

    <div class="hero">
        <h1>VisionAIHub</h1>
        <p>Smart City Visual Analytics Platform</p>
    </div>

    <div class="upload-card">

        <h2>YOLO Object Detection</h2>
        <p>
            Upload a traffic image to detect vehicles, people,
            traffic lights, and stop signs.
        </p>

        <form action="/predict"
              method="POST"
              enctype="multipart/form-data">

            <label>Upload Traffic Image</label>

            <input
                type="file"
                name="image"
                accept="image/*"
                required>

            <label>Confidence Threshold</label>

            <select name="confidence">
                <option value="0.3">0.30 - More detections</option>
                <option value="0.4" selected>0.40 - Balanced</option>
                <option value="0.5">0.50 - Strict</option>
                <option value="0.7">0.70 - High confidence only</option>
            </select>

            <button type="submit">
                Analyze Image
            </button>

        </form>

        <div class="actions">
            <a href="/history" class="secondary-btn">
                View Detection History
            </a>
        </div>

    </div>

</div>

</body>
</html>
